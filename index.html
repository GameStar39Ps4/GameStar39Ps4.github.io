
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تهكير PS4 - GameStar39</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: url('icon0.png') no-repeat center center fixed;
      background-size: cover;
      font-family: sans-serif;
      color: white;
      text-align: center;
    }
    .container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .button {
      padding: 15px 30px;
      background-color: #1d1d1d;
      color: white;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 10px #000;
    }
    #statsBox {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(0, 0, 0, 0.8);
      padding: 12px 24px;
      border-radius: 15px;
      font-size: 20px;
      direction: rtl;
    }
    #statsBox a {
      color: #00aaff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>مرحبًا بك في موقع تهكير PS4 9.00</h1>
    <button class="button" onclick="location.href='cache.html'">ابدأ التهكير</button>
  </div>

  <div id="statsBox">
    <span id="successCount">نجاحات التعديلة: 0</span> |
    <span id="failCount">فشل التعديلة: 0</span>
    <div>الموقع مقدم من طرف <a href="https://www.youtube.com/@GameStar39" target="_blank">GameStar39</a></div>
  </div>

  <script>
    document.getElementById("successCount").textContent = "نجاحات التعديلة: " + (localStorage.getItem("success") || 0);
    document.getElementById("failCount").textContent = "فشل التعديلة: " + (localStorage.getItem("fail") || 0);
  </script>
</body>
</html>
