
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GameStar39 | GoldHEN Loader</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('icon0.jpg');
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    .status-message {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.6);
      padding: 15px 25px;
      font-size: 20px;
      border-radius: 10px;
      text-align: center;
    }

    #myProgress {
      width: 40%;
      background-color: rgba(255,255,255,0.3);
      border-radius: 10px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #myBar {
      width: 1%;
      height: 20px;
      background-color: #00e676;
      border-radius: 10px;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
    }

    .footer a {
      color: #00e5ff;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="status-message" id="statusText">Preparing GoldHEN Exploit...</div>

  <div id="myProgress">
    <div id="myBar"></div>
  </div>

  <div class="footer">
    This page is provided by <strong>GameStar39</strong> •
    <a href="https://www.youtube.com/@GameStar_39" target="_blank">My YouTube Channel</a><br>
    Success: <span id="success">1</span> Failure: <span id="failure">0</span>
  </div>

  <script>
    window.onload = function() {
      var elem = document.getElementById("myBar");
      var statusText = document.getElementById("statusText");
      var width = 1;
      var id = setInterval(function() {
        if (width >= 100) {
          clearInterval(id);
          document.getElementById("success").textContent = parseInt(document.getElementById("success").textContent) + 1;
          statusText.textContent = "GoldHEN Injected Successfully! 🎉";
        } else {
          width++;
          elem.style.width = width + "%";
        }
      }, 25);
    };
  </script>

</body>
</html>
