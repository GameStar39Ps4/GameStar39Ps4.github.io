
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GoldHEN Auto Load</title>
  <style>
    body {
      margin: 0;
      background-image: url('icon0.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: Arial, sans-serif;
      color: white;
      overflow: hidden;
    }

    #myProgress {
      width: 40%;
      background-color: #ddd;
      border-radius: 6px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #myBar {
      width: 1%;
      height: 20px;
      background-color: #00c853;
      border-radius: 6px;
    }

    .status-message {
      position: absolute;
      top: 35%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      background: rgba(0, 0, 0, 0.6);
      padding: 10px 20px;
      border-radius: 10px;
      text-align: center;
    }

    .footer {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
    }

    .footer a {
      color: #00e5ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="status-message" id="statusText">Preparing GoldHEN Exploit...</div>

  <div id="myProgress">
    <div id="myBar"></div>
  </div>

  <div class="footer">
    This page is provided by <strong>GameStar39</strong> •
    <a href="https://www.youtube.com/@GameStar_39" target="_blank">My YouTube Channel</a><br>
    Success: <span id="success">1</span> Failure: <span id="failure">0</span>
  </div>

  <script>
    var elem = document.getElementById("myBar");
    var statusText = document.getElementById("statusText");
    var width = 1;
    var id = setInterval(frame, 20);
    function frame() {
      if (width >= 100) {
        clearInterval(id);
        document.getElementById("success").innerText = parseInt(document.getElementById("success").innerText) + 1;
        statusText.textContent = "GoldHEN Injected Successfully! 🎉";
      } else {
        width++;
        elem.style.width = width + '%';
      }
    }
  </script>
</body>
</html>
