<body>
  <script>
    if (window.applicationCache.status === 0) {
      window.location.replace("cache.html");
    }

  <script type="module" src="./alert.mjs"></script>

<script>
  let successGiven = false;

  const failureIndicators = [
    "0x80020003",
    "unhandled rejection",
    "dieerror",
    "failed to make aliased pktopts"
  ];

  const checkInterval = setInterval(() => {
    const console = document.getElementById("console");
    if (!console) return;
    const text = console.innerText.toLowerCase();

    if (text.includes("kernel exploit succeeded!")) {
      if (!successGiven) {
        incrementSuccess();
        successGiven = true;
        clearInterval(checkInterval);
      }
    }

    if (failureIndicators.some(err => text.includes(err))) {
      if (!successGiven) {
        incrementFail();
        successGiven = true;
        clearInterval(checkInterval);
      }
    }
  }, 1000);
</script>


<div id="statsBox" style="position: fixed; bottom: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px 15px; border-radius: 10px; font-family: monospace; font-size: 14px; z-index: 9999;">

</div>
<script>
  function incrementSuccess() {
    let el = document.getElementById("successCount");
    el.innerText = parseInt(el.innerText) + 1;
    localStorage.setItem("successes", el.innerText);
  }
  function incrementFail() {
    let el = document.getElementById("failCount");
    el.innerText = parseInt(el.innerText) + 1;
    localStorage.setItem("fails", el.innerText);
  }
  window.onload = () => {
    document.getElementById("successCount").innerText = localStorage.getItem("successes") || "0";
    document.getElementById("failCount").innerText = localStorage.getItem("fails") || "0";
  }
</script>
