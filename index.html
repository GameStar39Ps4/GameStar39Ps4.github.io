<!DOCTYPE html>
<html>
<head>
  <title>Index - GameStar39</title>
  <meta charset="UTF-8">
  <style>
    body {
      background-image: url('icon0.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      font-size: 24px;
      text-align: center;
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
  </style>
</head>
<body>
  <pre id="console" style="display:none;"></pre>
  <div id="goldhen-status" style="font-size:24px; color:white; text-align:center; margin-top:20px;">
    جاري تفعيل GoldHEN...
  </div>

  <script src="payload.js"></script>
  <script type="module" src="./alert.mjs"></script>

  <script>
    let statusGiven = false;
    const consoleBox = document.getElementById("console");
    const statusMsg = document.getElementById("goldhen-status");

    const checkInterval = setInterval(() => {
      const text = (consoleBox?.innerText || "").toLowerCase();

      if (!statusGiven && text.includes("kernel exploit succeeded!")) {
        statusMsg.innerText = "مبروك عليك GoldHEN v2.4b18.5";
        statusGiven = true;
        clearInterval(checkInterval);
      }
      else if (!statusGiven && (text.includes("delete errors") || text.includes("target states"))) {
        statusMsg.innerText = "للأسف فشل تفعيل GoldHEN v2.4b18.5، أعد المحاولة.";
        statusGiven = true;
        clearInterval(checkInterval);
      }
    }, 800);
  </script>
</body>
</html>
